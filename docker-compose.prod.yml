services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-ticket-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_ticket_management
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    container_name: ai-ticket-server-prod
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_ticket_management?schema=public
      SESSION_SECRET: production-secret-change-later
      NODE_ENV: production
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      - postgres

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
    container_name: ai-ticket-client-prod
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  postgres_prod_data:
